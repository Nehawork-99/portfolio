<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio – About Section</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      width: 680px;
      background: #ffffff;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect x="0" y="0" width="680" height="400" fill="#ffffff"/>

      <!-- Left panel -->
      <rect x="40" y="32" width="260" height="336" rx="12" fill="#f5f4f0" stroke="#d3d1c7" stroke-width="0.5"/>

      <!-- Avatar -->
      <circle cx="170" cy="110" r="44" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
      <text x="170" y="118" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="500" fill="#3C3489">LB</text>

      <!-- Title -->
      <text x="170" y="180" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#1a1a18">Luxury × Performance</text>
      <text x="170" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#5f5e5a">Marketing Specialist</text>

      <!-- Divider -->
      <line x1="64" y1="220" x2="276" y2="220" stroke="#d3d1c7" stroke-width="0.5"/>

      <!-- Location + education -->
      <text x="64" y="246" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5f5e5a">📍 London, UK</text>
      <text x="64" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5f5e5a">MA Luxury Brand Management</text>
      <text x="64" y="284" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#888780">University of Southampton · Merit</text>
      <text x="64" y="308" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5f5e5a">BA Mass Media</text>
      <text x="64" y="324" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#888780">First Class Distinction</text>

      <!-- Right to work badge -->
      <rect x="64" y="342" width="135" height="24" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
      <text x="131" y="358" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#085041">Right to work in UK ✓</text>

      <!-- D2C & Luxury pill -->
      <rect x="560" y="32" width="80" height="56" rx="10" fill="#f5f4f0" stroke="#d3d1c7" stroke-width="0.5"/>
      <text x="600" y="57" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#993C1D">D2C &amp;</text>
      <text x="600" y="73" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#993C1D">Luxury</text>

      <!-- Funnel label -->
      <text x="320" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5f5e5a">Full-funnel approach</text>

      <!-- Funnel stage 1 -->
      <rect x="320" y="68" width="228" height="36" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
      <text x="434" y="85" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#3C3489">Brand storytelling · Paid media</text>
      <text x="434" y="99" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#3C3489">Product launches</text>

      <line x1="434" y1="104" x2="434" y2="115" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

      <!-- Funnel stage 2 -->
      <rect x="336" y="116" width="196" height="36" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
      <text x="434" y="133" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#085041">Performance marketing</text>
      <text x="434" y="147" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#085041">CRM automation</text>

      <line x1="434" y1="152" x2="434" y2="163" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

      <!-- Funnel stage 3 -->
      <rect x="352" y="164" width="164" height="36" rx="6" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
      <text x="434" y="181" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#993C1D">E-commerce · D2C growth</text>
      <text x="434" y="195" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#993C1D">Premium platforms</text>

      <!-- Markets label -->
      <text x="320" y="234" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5f5e5a">Markets &amp; sectors</text>

      <!-- Market tags -->
      <rect x="320" y="246" width="96" height="24" rx="4" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
      <text x="368" y="262" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#0C447C">International</text>

      <rect x="424" y="246" width="72" height="24" rx="4" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
      <text x="460" y="262" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#3C3489">Luxury</text>

      <rect x="504" y="246" width="56" height="24" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
      <text x="532" y="262" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#085041">D2C</text>

      <rect x="568" y="246" width="52" height="24" rx="4" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
      <text x="594" y="262" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#993C1D">CRM</text>

      <!-- Divider + quote -->
      <line x1="320" y1="292" x2="640" y2="292" stroke="#d3d1c7" stroke-width="0.5"/>
      <text x="320" y="316" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#888780" font-style="italic">Consumer insights → strategic campaigns → measurable growth</text>

      <!-- Industries label -->
      <text x="320" y="348" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5f5e5a">Industries</text>

      <rect x="320" y="358" width="68" height="22" rx="4" fill="#f5f4f0" stroke="#d3d1c7" stroke-width="0.5"/>
      <text x="354" y="373" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#5f5e5a">Fashion</text>

      <rect x="396" y="358" width="68" height="22" rx="4" fill="#f5f4f0" stroke="#d3d1c7" stroke-width="0.5"/>
      <text x="430" y="373" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#5f5e5a">Beauty</text>

      <rect x="472" y="358" width="68" height="22" rx="4" fill="#f5f4f0" stroke="#d3d1c7" stroke-width="0.5"/>
      <text x="506" y="373" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#5f5e5a">Lifestyle</text>

      <rect x="548" y="358" width="88" height="22" rx="4" fill="#f5f4f0" stroke="#d3d1c7" stroke-width="0.5"/>
      <text x="592" y="373" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#5f5e5a">E-commerce</text>
    </svg>
  </div>
</body>
</html>
